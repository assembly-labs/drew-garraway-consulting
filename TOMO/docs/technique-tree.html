<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOMO Technique Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@500;600&family=Unbounded:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111111;--text:#ffffff;--gold:#F5A623;
  --gold-dim:rgba(245,166,35,0.15);--gold-ultra:rgba(245,166,35,0.04);
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#8B5CF6;
  --gray-1:#d4d4d4;--gray-2:#c4c4c4;--gray-3:#a3a3a3;--gray-4:#8a8a8a;
  --gray-5:#4a4a4a;--gray-6:#1f1f1f;--gray-7:#161616;
  --orange:#f97316;--cyan:#06b6d4;
}
html{font-size:16px;background:var(--bg);color:var(--text)}
body{font-family:'Inter',sans-serif;font-weight:500;min-height:100vh;display:flex;flex-direction:column}
input{font-family:'Inter',sans-serif;font-weight:500}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;min-width:280px;background:var(--gray-7);border-right:1px solid var(--gray-5);display:flex;flex-direction:column;overflow-y:auto;z-index:10}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:12px 24px;background:var(--gray-6);border-bottom:1px solid var(--gray-5);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.content{flex:1;overflow-y:auto;padding:32px 24px}
.logo{padding:24px 20px 8px}
.logo-title{font-family:'Unbounded',sans-serif;font-weight:800;font-size:28px;color:var(--gold);letter-spacing:2px}
.logo-sub{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:12px;color:var(--gray-3);letter-spacing:3px;margin-top:4px;text-transform:uppercase}
.pos-list{padding:12px 12px 8px;flex:1}
.pos-btn{display:block;width:100%;text-align:left;background:var(--gray-6);border:1px solid transparent;border-radius:8px;padding:10px 14px;margin-bottom:6px;cursor:pointer;transition:all 0.15s;color:var(--gray-2);font-family:'Inter',sans-serif;font-weight:600;font-size:13px}
.pos-btn:hover{border-color:var(--gray-5);color:var(--text);background:var(--gray-6)}
.pos-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.pos-btn .pos-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gray-4);float:right;font-weight:500}
.pos-btn.active .pos-count{color:var(--gold)}
.sidebar-stats{padding:16px 20px;border-top:1px solid var(--gray-5);font-size:12px}
.sidebar-stats .stat-row{display:flex;justify-content:space-between;margin-bottom:4px;color:var(--gray-3)}
.sidebar-stats .stat-row .val{color:var(--gray-1);font-family:'JetBrains Mono',monospace;font-weight:600}
.search-input{background:var(--gray-7);border:1px solid var(--gray-5);border-radius:8px;padding:8px 14px;color:var(--text);font-size:14px;min-width:240px;outline:none;transition:border-color 0.15s}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--gray-4)}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{background:var(--gray-6);border:1px solid var(--gray-5);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray-3);transition:all 0.15s;white-space:nowrap}
.pill:hover{color:var(--text);border-color:var(--gray-4)}
.pill.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.shown-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gray-4);margin-left:auto;white-space:nowrap}
.pos-header{margin-bottom:28px}
.pos-name{font-family:'Unbounded',sans-serif;font-weight:800;font-size:28px;color:var(--text);margin-bottom:6px}
.pos-desc{color:var(--gray-2);font-size:14px;max-width:600px;line-height:1.5;margin-bottom:8px}
.perspective-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:3px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:1px}
.perspective-badge.top{background:rgba(245,166,35,0.12);color:var(--gold)}
.perspective-badge.bottom{background:rgba(59,130,246,0.12);color:var(--blue)}
.perspective-badge.standing{background:rgba(139,92,246,0.12);color:var(--purple)}
.perspective-badge.neutral{background:rgba(163,163,163,0.12);color:var(--gray-3)}
.branches{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:1100px){.branches{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.branches{grid-template-columns:1fr}}
.branch{background:var(--gray-7);border-radius:12px;border:1px solid var(--gray-5);overflow:hidden}
.branch-header{padding:14px 18px;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:2px;border-bottom:2px solid var(--gray-5)}
.branch.offense .branch-header{border-bottom-color:var(--gold);color:var(--gold)}
.branch.defense .branch-header{border-bottom-color:var(--green);color:var(--green)}
.branch.neutral .branch-header{border-bottom-color:var(--blue);color:var(--blue)}
.branch-body{padding:8px}
.branch-empty{padding:20px;text-align:center;color:var(--gray-4);font-size:13px}
.tech-card{background:var(--gray-6);border:1px solid transparent;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all 0.15s;overflow:hidden}
.tech-card:hover{border-color:var(--gray-5)}
.tech-card.expanded{border-color:var(--gray-4)}
.tech-summary{padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tech-name{font-weight:700;font-size:14px;color:var(--text);flex:1;min-width:120px}
.type-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:2px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:0.5px}
.type-submission{background:rgba(239,68,68,0.15);color:var(--red)}
.type-sweep{background:rgba(245,166,35,0.15);color:var(--gold)}
.type-pass{background:rgba(59,130,246,0.15);color:var(--blue)}
.type-escape{background:rgba(34,197,94,0.15);color:var(--green)}
.type-control{background:rgba(138,138,138,0.15);color:var(--gray-3)}
.type-transition{background:rgba(139,92,246,0.15);color:var(--purple)}
.type-takedown{background:rgba(249,115,22,0.15);color:var(--orange)}
.type-entry{background:rgba(6,182,212,0.15);color:var(--cyan)}
.type-defense{background:rgba(34,197,94,0.15);color:var(--green)}
.belt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.belt-dot.white{background:#fff;border:1px solid var(--gray-4)}
.belt-dot.blue{background:#3b82f6}
.belt-dot.purple{background:#8B5CF6}
.belt-dot.brown{background:#92400e}
.gi-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;color:var(--gray-4);border:1px solid var(--gray-5)}
.expand-arrow{color:var(--gray-4);font-size:12px;transition:transform 0.2s;flex-shrink:0}
.tech-card.expanded .expand-arrow{transform:rotate(90deg)}
.tech-detail{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
.tech-card.expanded .tech-detail{max-height:2000px}
.tech-detail-inner{padding:0 14px 14px;border-top:1px solid var(--gray-5);padding-top:12px}
.detail-section{margin-bottom:12px}
.detail-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--gray-4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.detail-desc{color:var(--gray-2);font-size:13px;line-height:1.5}
.detail-list{list-style:none;padding:0}
.detail-list li{color:var(--gray-2);font-size:13px;padding:2px 0;padding-left:14px;position:relative;line-height:1.4}
.detail-list li::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--gray-4)}
.detail-list.mistakes li{color:var(--gray-4)}
.detail-list.mistakes li::before{background:var(--red)}
.related-link{display:inline-block;background:var(--gold-ultra);border:1px solid rgba(245,166,35,0.2);border-radius:6px;padding:3px 10px;margin:2px 4px 2px 0;font-size:12px;font-weight:600;color:var(--gold);cursor:pointer;transition:all 0.15s;text-decoration:none}
.related-link:hover{background:var(--gold-dim);border-color:var(--gold)}
.counter-text{color:var(--gray-3);font-size:13px}
.trad-name{color:var(--gray-4);font-style:italic;font-size:13px}
.pos-badge-link{display:inline-block;background:var(--gray-6);border:1px solid var(--gray-5);border-radius:6px;padding:2px 8px;margin:2px 4px 2px 0;font-size:12px;font-weight:600;color:var(--gray-3);cursor:pointer;transition:all 0.15s}
.pos-badge-link:hover{border-color:var(--gold);color:var(--gold)}
.highlight{background:rgba(245,166,35,0.25);border-radius:2px;padding:0 1px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--gray-7)}
::-webkit-scrollbar-thumb{background:var(--gray-5);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-4)}
.menu-toggle{display:none;background:none;border:none;color:var(--gold);font-size:24px;cursor:pointer;padding:4px 8px}
@media(max-width:768px){
  .sidebar{position:fixed;left:-280px;top:0;height:100vh;transition:left 0.25s;z-index:100}
  .sidebar.open{left:0}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
  .sidebar-overlay.show{display:block}
  .menu-toggle{display:block}
  .search-input{min-width:140px}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-title">TOMO</div>
      <div class="logo-sub">Technique Tree</div>
    </div>
    <div class="pos-list" id="posList"></div>
    <div class="sidebar-stats" id="sidebarStats"></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
      <input type="text" class="search-input" id="searchInput" placeholder="Search techniques...">
      <div class="filter-pills" id="beltFilters"></div>
      <div class="filter-pills" id="giFilters"></div>
      <div class="shown-count" id="shownCount"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<script>
var POSITIONS=[{"id":"closed_guard","name":"Closed Guard","description":"Full guard with legs locked around opponent. Primary attacking position from bottom.","perspective":"bottom","csvPrefix":"CG","branches":{"offense":[{"id":"CG_001","name":"Scissor Sweep","alternateNames":["Knee Push Sweep"],"traditionalName":"Tesoura","type":"sweep","subcategory":"sweeps","branch":"offense","beltLevel":"white","giNogi":"both","ibjjfLegal":"all_belts","description":"Classic sweep using knee shield and sleeve control with scissoring leg motion to off-balance opponent","keyPoints":["Establish knee shield across torso","Control same-side sleeve","Chop back leg while driving knee through","Maintain sleeve control throughout"],"commonMistakes":["Opening guard too early","Not controlling the sleeve","Insufficient hip movement","Chopping leg instead of scissoring"],"relatedIds":["CG_002","CG_003","CG_004"],"counterIds":["Standing in guard","Posturing up","Base widening"],"positionIds":["closed_guard"]},{"id":"CG_002","name":"Hip Bump Sweep","alternateNames":["Sit-Up Sweep"],"traditionalName":"Raspagem de Quadril","type":"sweep","subcategory":"sweeps","branch":"offense","beltLevel":"white","giNogi":"both","ibjjfLegal":"all_belts","description":"Explosive sit-up sweep capitalizing on opponent's low posture or hands-on-mat position","keyPoints":["Wait for opponent to post hands on mat","Sit up explosively with posting hand","Throw opposite arm over shoulder","Follow momentum to mount"],"commonMistakes":["Hesitating on the sit-up","Not controlling the arm","Attempting when opponent has good posture","Insufficient explosion"],"relatedIds":["CG_001","CG_005","MT_001"],"counterIds":["Posting with elbow","Pulling back quickly","Crossfacing"],"positionIds":["closed_guard"]},{"id":"CG_003","name":"Flower Sweep","alternateNames":["Pendulum Sweep"],"traditionalName":"Raspagem Flor","type":"sweep","subcategory":"sweeps","branch":"offense","beltLevel":"white","giNogi":"both","ibjjfLegal":"all_belts","description":"High-amplitude sweep using pendulum leg motion and opponent's sleeve and pants control","keyPoints":["Control sleeve and same-side pants at knee","Open guard and swing pendulum leg wide","Use momentum to sweep to mount","Keep grips tight throughout"],"commonMistakes":["Insufficient momentum on pendulum","Releasing grips too early","Not opening guard fully","Poor timing"],"relatedIds":["CG_001","CG_002","CG_004"],"counterIds":["Base wide","Let go of grips","Stack pass attempt"],"positionIds":["closed_guard"]},{"id":"CG_004","name":"Elevator Sweep","alternateNames":["Hook Sweep"],"traditionalName":"Raspagem Elevador","type":"sweep","subcategory":"sweeps","branch":"offense","beltLevel":"white","giNogi":"both","ibjjfLegal":"all_belts","description":"Sweep used when opponent stands in closed guard by elevating with butterfly-style hook","keyPoints":["When opponent stands, underhook one leg","Control wrist on same side","Elevate with hook while pulling wrist","Follow to top position"],"commonMistakes":["Not maintaining wrist control","Poor hook placement","Attempting too early","Not following to top"],"relatedIds":["CG_001","CG_005","OG_020"],"counterIds":["Passing over leg","Disengaging quickly","Knee slice pass"],"positionIds":["closed_guard"]},{"id":"CG_005","name":"Overhead Sweep","alternateNames":["Balloon Sweep"],"traditionalName":"Raspagem por Cima","type":"sweep","subcategory":"sweeps","branch":"offense","beltLevel":"blue","giNogi":"both","ibjjfLegal":"all_belts","description":"Sweep that sends opponent overhead using feet on hips when they drive forward aggressively","keyPoints":["Place feet on hips when opponent drives forward","Control sleeves or collar and sleeve","Pull opponent forward while extending legs","Roll back and over to mount"],"commonMistakes":["Feet slipping off hips","Insufficient pull on upper body","Poor timing with leg extension","Not committing to the roll"],"relatedIds":["CG_004","CG_003","OG_020"],"counterIds":["Dropping wei iangle","Cut angle toward trapped arm side","Squeeze knees together while pulling head down"],"commonMistakes":["Not cutting the angle","Legs too loose","Not breaking posture first","Attacking from flat position"],"relatedIds":["CG_009","CG_011","CG_012"],"counterIds":["Posturing up","Stacking","Arm extraction"],"positionIds":["closed_guard"]},{"id":"CG_009","name":"Armbar from Guard","alternateNames":["Cross Armbar"],"traditionalName":"Juji-gatame / Chave de Braço","type":"submission","subcategory":"submissions","branch":"offense","beltLevel":"white","giNogi":"both","ibjjfLegal":"all_belts","description":"Fundamental armbar isolating opponent's arm while controlling with hips and legs across body","keyPoints":["Control wrist and elbow","Pivot hips perpendicular to opponent","Swing leg over face while holding arm tight","Pinch knees and extend hips for finish"],"commonMistakes":["Not controlling the arm throughout","Hips too far from armpit","Legs not tight","Extending before positioning"],"relatedIds":["CG_008","CG_010","CG_011"],"counterIds":["Stacking pass","Pulling arm out","Hitchhiker escape"],"positionIds":["closed_guard"]},{"id":"CG_010","name":"Kimura from Guard","alternateNames":[],"traditionalName":"Gyaku Ude-garami","type":"submission","subcategory":"submissions","branch":"offense","beltLevel":"white","giNogi":"both","ibjjfLegal":"all_belts","description":"Figure-four shoulder lock attacking opponent's bent arm from closed guard position","keyPoints":["Break posture and control wrist","Sit up and establish figure-four grip","Fall to hip while maintaining control","Rotate arm behind back"],"commonMistakes":["Not sitting up enough","Loose grip","Allowing opponent to posture","Not controlling elbow"],"relatedIds":["CG_009","CG_011","CG_013"],"counterIds":["Straightening arm","Pulling arm free","Stacking"],"positionIds":["closed_guard"]},{"id":"CG_011","name":"Omoplata","alternateNames":[],"traditionalName":"Ashi-garami (shoulder)","type":"submission","subcategory":"submissions","branch":"offense","beltLevel":"blue","giNogi":"both","ibjjfLegal":"all_belts","description":"Shoulder lock using leg over opponent's shoulder with forward pressure while seated","keyPoints":["Control opposite wrist","Swing leg over shoulder","Sit up and secure position","Apply forward pressure on shoulder"],"commonMistakes":["Not sitting up","Allowing opponent to roll","Poor wrist control","Not securing position before pressure"],"relatedIds":["CG_008","CG_009","CG_012"],"counterIds":["Roll through","Pulling arm out","Posturing up"],"positionIds":["closed_guard"]},{"id":"CG_012","name":"Cross Collar Choke","alternateNames":["Cross Choke"],"traditionalName":"Estrangulamento Cruzado / Jūji-jime","type":"submission","subcategory":"submissions","branch":"offense","beltLevel":"white","giNogi":"gi","ibjjfLegal":"all_belts","description":"Classic gi choke using deep cross grips on opponent's collar to create blood choke","keyPoints":["Establish deep grip with thumb inside collar","Second grip crosses over first arm","Pull elbows tight to body","Squeeze forearms together"],"commonMistakes":["Grips not deep enough","Elbows flaring out","Not breaking posture first","Hands too close together"],"relatedIds":["CG_008","CG_018","MT_004"],"counterIds":["Stripping grips","Posturing up","Protecting neck"],"positionIds":["closed_guard"]},{"id":"CG_013","name":"Guillotine from Guard","alternateNames":["Front Headlock Choke"],"traditionalName":"Guilhotina","type":"submission","subcategory":"submissions","branch":"offense","beltLevel":"white","giNogi":"both","ibjjfLegal":"all_belts","description":"Front headlock choke applied when opponent dives head first into closed guard","keyPoints":["Wrap arm around neck when head drops","Secure grip (chin-strap or blade)","Close guard high on back","Crunch down while extending hips"],"commonMistakes":["Head not deep enough in armpit","Hips not elevated","Not closing guard","Loose grip"],"relatedIds":["CG_010","CG_008","SC_008 var currentPos='closed_guard';
var searchQuery='';
var beltFilter='all';
var giFilter='all';
var expandedTech=null;

var posMap={};
POSITIONS.forEach(function(p){posMap[p.id]=p;});

function buildSidebar(){
  var list=document.getElementById('posList');
  var html='';
  POSITIONS.forEach(function(p){
    var count=Object.keys(p.branches).reduce(function(s,b){return s+p.branches[b].length;},0);
    html+='<button class="pos-btn '+(p.id===currentPos?'active':'')+'" data-id="'+p.id+'">'+
      escH(p.name)+'<span class="pos-count">'+count+'</span></button>';
  });
  list.innerHTML=html;
  list.querySelectorAll('.pos-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      currentPos=btn.dataset.id;
      expandedTech=null;
      buildSidebar();
      renderContent();
      closeSidebar();
    });
  });
  var stats=document.getElementById('sidebarStats');
  var total=Object.keys(INDEX).length;
  var belts={white:0,blue:0,purple:0,brown:0};
  Object.values(INDEX).forEach(function(t){belts[t.beltLevel]=(belts[t.beltLevel]||0)+1;});
  stats.innerHTML=
    '<div class="stat-row"><span>Total Techniques</span><span class="val">'+total+'</span></div>'+
    '<div class="stat-row"><span>White Belt</span><span class="val">'+belts.white+'</span></div>'+
    '<div class="stat-row"><span>Blue Belt</span><span class="val">'+belts.blue+'</span></div>'+
    '<div class="stat-row"><span>Purple Belt</span><span class="val">'+belts.purple+'</span></div>'+
    '<div class="stat-row"><span>Brown Belt</span><span class="val">'+belts.brown+'</span></div>';
}

function buildFilters(){
  var beltEl=document.getElementById('beltFilters');
  var beltOpts=[['all','All Belts'],['white','White'],['blue','Blue'],['purple','Purple'],['brown','Brown']];
  beltEl.innerHTML=beltOpts.map(function(b){
    return '<button class="pill '+(beltFilter===b[0]?'active':'')+'" data-belt="'+b[0]+'">'+b[1]+'</button>';
  }).join('');
  beltEl.querySelectorAll('.pill').forEach(function(p){
    p.addEventListener('click',function(){beltFilter=p.dataset.belt;buildFilters();renderContent();});
  });
  var giEl=document.getElementById('giFilters');
  var giOpts=[['all','All'],['gi','Gi'],['nogi','No-Gi']];
  giEl.innerHTML=giOpts.map(function(g){
    return '<button class="pill '+(giFilter===g[0]?'active':'')+'" data-gi="'+g[0]+'">'+g[1]+'</button>';
  }).join('');
  giEl.querySelectorAll('.pill').forEach(function(p){
    p.addEventListener('click',function(){giFilter=p.dataset.gi;buildFilters();renderContent();});
  });
}

function escH(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function matchesSearch(t){
  if(!searchQuery)return true;
  var q=searchQuery.toLowerCase();
  if(t.name.toLowerCase().indexOf(q)>=0)return true;
  if(t.alternateNames&&t.alternateNames.some(function(a){return a.toLowerCase().indexOf(q)>=0;}))return true;
  if(t.traditionalName&&t.traditionalName.toLowerCase().indexOf(q)>=0)return true;
  return false;
}
function matchesBelt(t){return beltFilter==='all'||t.beltLevel===beltFilter;}
function matchesGi(t){
  if(giFilter==='all')return true;
  return t.giNogi==='both'||t.giNogi===giFilter;
}
function filterTech(t){return matchesSearch(t)&&matchesBelt(t)&&matchesGi(t);}

function hl(text){
  if(!searchQuery)return escH(text);
  var safe=escH(text);
  var q=searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  try{return safe.replace(new RegExp('('+q+')','gi'),'<span class="highlight">$1</span>');}
  catch(e){return safe;}
}

function renderContent(){
  var el=document.getElementById('content');
  var pos=posMap[currentPos];
  if(!pos){el.innerHTML='';return;}
  var shownCount=0;
  var branchOrder=['offense','defense','neutral'];
  var branchLabels={offense:'Offense',defense:'Defense',neutral:'Neutral'};
  var branchesHtml='';
  branchOrder.forEach(function(bKey){
    var techs=(pos.branches[bKey]||[]).filter(filterTech);
    shownCount+=techs.length;
    var cardsHtml='';
    if(techs.length===0){
      cardsHtml='<div class="branch-empty">No techniques match filters</div>';
    }else{
      techs.forEach(function(t){
        var isExp=expandedTech===t.id;
        var giLabel=t.giNogi==='both'?'Gi/NoGi':t.giNogi==='gi'?'Gi':'NoGi';
        var detail=isExp?'<div class="tech-detail-inner">'+buildDetail(t)+'</div>':'';
        cardsHtml+='<div class="tech-card '+(isExp?'expanded':'')+'" data-id="'+t.id+'">'+
          '<div class="tech-summary">'+
            '<span class="tech-name">'+hl(t.name)+'</span>'+
            '<span class="type-badge type-'+t.type+'">'+t.type+'</span>'+
            '<span class="belt-dot '+t.beltLevel+'" title="'+t.beltLevel+' belt"></span>'+
            '<span class="gi-badge">'+giLabel+'</span>'+
            '<span class="expand-arrow">&#9654;</span>'+
          '</div>'+
          '<div class="tech-detail">'+detail+'</div>'+
        '</div>';
      });
    }
    branchesHtml+='<div class="branch '+bKey+'">'+
      '<div class="branch-header">'+branchLabels[bKey]+' ('+techs.length+')</div>'+
      '<div class="branch-body">'+cardsHtml+'</div>'+
    '</div>';
  });
  el.innerHTML=
    '<div class="pos-header">'+
      '<div class="pos-name">'+escH(pos.name)+'</div>'+
      '<div class="pos-desc">'+escH(pos.description)+'</div>'+
      '<span class="perspective-badge '+pos.perspective+'">'+pos.perspective+'</span>'+
    '</div>'+
    '<div class="branches">'+branchesHtml+'</div>';
  document.getElementById('shownCount').textContent=shownCount+' techniques shown';
  el.querySelectorAll('.tech-card').forEach(function(card){
    card.querySelector('.tech-summary').addEventListener('click',function(){
      var id=card.dataset.id;
      expandedTech=expandedTech===id?null:id;
      renderContent();
      if(expandedTech){
        setTimeout(function(){
          var c=document.querySelector('.tech-card[data-id="'+expandedTech+'"]');
          if(c)c.scrollIntoView({behavior:'smooth',block:'nearest'});
        },50);
      }
    });
  });
}

function buildDetail(t){
  var h='';
  if(t.description){
    h+='<div class="detail-section"><div class="detail-label">Description</div><div class="detail-desc">'+escH(t.description)+'</div></div>';
  }
  if(t.traditionalName){
    h+='<div class="detail-section"><div class="detail-label">Traditional Name</div><div class="trad-name">'+escH(t.traditionalName)+'</div></div>';
  }
  if(t.alternateNames&&t.alternateNames.length){
    h+='<div class="detail-section"><div class="detail-label">Also Known As</div><div class="detail-desc">'+t.alternateNames.map(escH).join(', ')+'</div></div>';
  }
  if(t.keyPoints&&t.keyPoints.length){
    h+='<div class="detail-section"><div class="detail-label">Key Points</div><ul class="detail-list">'+t.keyPoints.map(function(k){return '<li>'+escH(k)+'</li>';}).join('')+'</ul></div>';
  }
  if(t.commonMistakes&&t.commonMistakes.length){
    h+='<div class="detail-section"><div class="detail-label">Common Mistakes</div><ul class="detail-list mistakes">'+t.commonMistakes.map(function(m){return '<li>'+escH(m)+'</li>';}).join('')+'</ul></div>';
  }
  if(t.relatedIds&&t.relatedIds.length){
    h+='<div class="detail-section"><div class="detail-label">Related Techniques</div><div>'+t.relatedIds.map(function(id){
      var r=INDEX[id];
      if(!r)return '<span class="related-link" style="opacity:0.4">'+escH(id)+'</span>';
      return '<a class="related-link" onclick="navigateTo(&apos;'+id+'&apos;)">'+escH(r.name)+'</a>';
    }).join('')+'</div></div>';
  }
  if(t.counterIds&&t.counterIds.length){
    h+='<div class="detail-section"><div class="detail-label">Counters</div><div class="counter-text">'+t.counterIds.map(escH).join(' / ')+'</div></div>';
  }
  if(t.positionIds&&t.positionIds.length){
    h+='<div class="detail-section"><div class="detail-label">Available In</div><div>'+t.positionIds.map(function(pid){
      var p=posMap[pid];
      if(!p)return '';
      return '<a class="pos-badge-link" onclick="navigateToPosition(&apos;'+pid+'&apos;)">'+escH(p.name)+'</a>';
    }).join('')+'</div></div>';
  }
  return h;
}

function navigateTo(techId){
  var t=INDEX[techId];
  if(!t)return;
  var targetPos=null;
  for(var i=0;i<POSITIONS.length;i++){
    var p=POSITIONS[i];
    var bkeys=Object.keys(p.branches);
    for(var j=0;j<bkeys.length;j++){
      if(p.branches[bkeys[j]].some(function(x){return x.id===techId;})){
        targetPos=p.id;break;
      }
    }
    if(targetPos)break;
  }
  if(targetPos){
    currentPos=targetPos;
    expandedTech=techId;
    buildSidebar();
    renderContent();
    setTimeout(function(){
      var c=document.querySelector('.tech-card[data-id="'+techId+'"]');
      if(c)c.scrollIntoView({behavior:'smooth',block:'center'});
    },100);
  }
}

function navigateToPosition(posId){
  currentPos=posId;
  expandedTech=null;
  buildSidebar();
  renderContent();
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('searchInput').addEventListener('input',function(e){
  searchQuery=e.target.value.trim();
  renderContent();
});

buildSidebar();
buildFilters();
renderContent();
</script>
</body>
</html>
