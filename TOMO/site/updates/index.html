<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOMO Updates</title>
<meta name="description" content="All TOMO release notes and feature updates.">
<link rel="canonical" href="https://traintomo.com/updates">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111111;
    color: #e0e0e0;
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 500;
    font-size: 17px;
    line-height: 1.8;
  }
  .header {
    text-align: center;
    padding: 48px 20px 32px;
    border-bottom: 1px solid #1f1f1f;
  }
  .header-logo {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: #F5A623;
    letter-spacing: 2px;
    text-decoration: none;
  }
  .header-nav {
    margin-top: 12px;
    font-size: 14px;
    color: #666;
  }
  .header-nav a { color: #999; text-decoration: none; }
  .header-nav a:hover { color: #F5A623; }

  .page-title {
    text-align: center;
    padding: 48px 20px 16px;
  }
  .page-title h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 800;
    font-size: 36px;
    color: #fff;
  }
  .page-title p {
    font-size: 16px;
    color: #888;
    margin-top: 8px;
  }

  .releases-list {
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  .release-link {
    display: block;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    text-decoration: none;
    transition: border-color 0.2s;
  }
  .release-link:hover { border-color: #F5A623; }
  .release-link-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #F5A623;
    letter-spacing: 1px;
  }
  .release-link-title {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #fff;
    margin-top: 8px;
  }
  .release-link-desc {
    font-size: 14px;
    color: #888;
    margin-top: 6px;
  }

  .footer {
    text-align: center;
    padding: 48px 20px;
    border-top: 1px solid #1f1f1f;
    font-size: 14px;
    color: #555;
  }
  .footer a { color: #F5A623; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <a href="https://traintomo.com" class="header-logo">TOMO</a>
  <div class="header-nav"><a href="https://traintomo.com">Home</a> / Updates</div>
</div>

<div class="page-title">
  <h1>Updates</h1>
  <p>Features and improvements shipping to TOMO</p>
</div>

<div class="releases-list">
  <a href="/updates/2026-04-12" class="release-link">
    <div class="release-link-date">April 12, 2026</div>
    <div class="release-link-title">Intelligent Session Editing</div>
    <div class="release-link-desc">Technique autocomplete, position-aware suggestions, cleaner session views, and specific save confirmations.</div>
  </a>
</div>

<div class="footer">
  <p>TOMO &mdash; Your training. Remembered.</p>
  <p style="margin-top: 8px;"><a href="https://traintomo.com">traintomo.com</a></p>
</div>

</body>
</html>
