name: Deploy Site to Cloudflare Pages

# Triggers when any deployable content changes on main
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'robots.txt'
      - 'sitemap.xml'
      - '_redirects'
      - 'kaijutsu/**'
      - 'read-out-loud/**'
      - 'scout-grants/**'
      - '.github/workflows/deploy-site.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # --- Assemble _site/ directory ---
      # No build step needed: all remaining projects on drewgarraway.com are
      # static HTML/CSS/JS. FHM (the only project that required Node + npm)
      # was extracted to its own repo and domain (franklinhughmoney.com) on
      # 2026-04-09. Old /fhm/* URLs are 301-redirected via the _redirects file
      # at the repo root.
      - name: Assemble site
        run: |
          mkdir -p _site

          # Root files
          cp index.html _site/
          [ -f robots.txt ] && cp robots.txt _site/ || true
          [ -f sitemap.xml ] && cp sitemap.xml _site/ || true
          [ -f _redirects ] && cp _redirects _site/ || true

          # Kaijutsu — static HTML + images
          mkdir -p _site/kaijutsu
          cp kaijutsu/index.html _site/kaijutsu/
          cp kaijutsu/*.png _site/kaijutsu/ 2>/dev/null || true

          # Read Out Loud — static PWA
          mkdir -p _site/read-out-loud
          cp read-out-loud/index.html _site/read-out-loud/
          cp -r read-out-loud/css _site/read-out-loud/
          cp -r read-out-loud/js _site/read-out-loud/
          cp -r read-out-loud/icons _site/read-out-loud/
          cp read-out-loud/manifest.json _site/read-out-loud/
          cp read-out-loud/sw.js _site/read-out-loud/
          [ -f read-out-loud/_headers ] && cp read-out-loud/_headers _site/read-out-loud/ || true
          [ -f read-out-loud/_redirects ] && cp read-out-loud/_redirects _site/read-out-loud/ || true

          # Scout Grants — static HTML grant drafts
          mkdir -p _site/scout-grants
          cp -r scout-grants/. _site/scout-grants/

      # --- Deploy to Cloudflare Pages ---
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=drewgarraway --commit-dirty=true
