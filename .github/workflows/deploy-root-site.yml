name: Deploy Root Site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'products.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy index.html --project-name=drewgarraway --commit-dirty=true
